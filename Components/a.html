<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kiosk Dịch vụ hành chính</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
      :root {
        --bg-body: #eceef1;
        --btn-orange: #c87941;
        --btn-blue: #1976d2;
        --btn-cyan: #0097a7;
        --btn-pink: #ad1457;
        --btn-video: #8b1a1a;
      }

      body {
        background: var(--bg-body);
        font-family: "Segoe UI", Roboto, sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        padding: 20px 0;
        overflow-x: hidden;
      }

      .main-container {
        max-width: 1200px;
        margin: auto;
        padding: 20px;
      }

      .title {
        text-align: center;
        font-weight: 800;
        color: #b71c1c;
        margin-bottom: 40px;
        text-transform: uppercase;
        font-size: 2.5rem;
      }

      .service-btn {
        height: 160px;
        border-radius: 25px;
        color: white !important;
        font-size: 22px;
        font-weight: 700;
        display: flex;
        align-items: center;
        padding: 0 15px;
        border: none;
        transition: all 0.2s ease;
        text-decoration: none;
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
        text-align: left;
        line-height: 1.2;
      }

      .service-btn i {
        font-size: 50px;
        margin-right: 20px;
        flex-shrink: 0;
      }

      .service-btn:active {
        transform: scale(0.96);
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      }

      .btn-orange {
        background: var(--btn-orange);
      }
      .btn-blue {
        background: var(--btn-blue);
      }
      .btn-cyan {
        background: var(--btn-cyan);
      }
      .btn-pink {
        background: var(--btn-pink);
      }
      .btn-video {
        background: var(--btn-video);
      }

      /* Overlay Rating */
      .custom-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.9);
        display: none;
        z-index: 2000;
        justify-content: center;
        align-items: center;
      }

      .rating-card {
        background: white;
        padding: 40px;
        border-radius: 40px;
        width: 90%;
        max-width: 900px;
        text-align: center;
      }

      .face-rating-group {
        display: flex;
        justify-content: space-between;
        margin: 40px 0;
      }

      .face-item {
        cursor: pointer;
        transition: 0.3s;
        filter: grayscale(100%);
        opacity: 0.5;
      }
      .face-item.active {
        filter: grayscale(0%);
        opacity: 1;
        transform: scale(1.3);
      }
      .face-item i {
        font-size: 70px;
      }
      .face-label {
        display: block;
        font-size: 14px;
        font-weight: 700;
        margin-top: 10px;
      }

      .btn-submit {
        background: #2e7d32;
        color: white;
        padding: 15px 50px;
        font-size: 24px;
        border-radius: 60px;
        border: none;
        width: 100%;
      }
    </style>
  </head>

  <body>
    <div class="container main-container">
      <h1 class="title">XIN MỜI LỰA CHỌN DỊCH VỤ</h1>

      <div class="row g-4">
        <div class="col-md-6">
          <a
            href="https://mndemo.titkul.edu.vn/"
            target="_blank"
            class="btn service-btn btn-orange w-100"
          >
            <i class="bi bi-ticket-perforated"></i> HỆ THỐNG QUẢN LÝ MẦM NON
          </a>
        </div>

        <div class="col-md-6">
          <a
            href="https://k12demo.titkul.edu.vn/"
            target="_blank"
            class="btn service-btn btn-blue w-100"
          >
            <i class="bi bi-file-earmark-arrow-up"></i> HỆ THỐNG QUẢN LÝ
            TH-THCS-THPT
          </a>
        </div>

        <div class="col-md-6">
          <button
            onclick="openVideo('https://www.youtube.com/watch?v=Ik92rfz5dOM')"
            class="btn service-btn btn-video w-100"
          >
            <i class="bi bi-play-circle-fill"></i> VIDEO THỰC TẾ SẢN PHẨM MẦM
            NON
          </button>
        </div>

        <div class="col-md-6">
          <button
            onclick="openVideo('https://www.youtube.com/watch?v=4SgxM0xHb40')"
            class="btn service-btn btn-video w-100"
          >
            <i class="bi bi-play-circle-fill"></i> VIDEO THỰC TẾ SẢN PHẨM
            TH-THCS-THPT
          </button>
        </div>

        <div class="col-md-6">
          <a
            href="https://dichvucong.gov.vn/p/home/dvc-index-tinhthanhpho-mucdohailong.html"
            target="_blank"
            class="btn service-btn btn-cyan w-100"
          >
            <i class="bi bi-search"></i> CỔNG DỊCH VỤ CÔNG QUỐC GIA
          </a>
        </div>

        <div class="col-md-6">
          <button onclick="openRating()" class="btn service-btn btn-pink w-100">
            <i class="bi bi-hand-thumbs-up"></i> ĐÁNH GIÁ MỨC ĐỘ HÀI LÒNG
          </button>
        </div>
      </div>

      <div style="margin-top: 50px; text-align: center">
        <button
          onclick="exportExcel()"
          class="btn btn-sm btn-outline-secondary opacity-25"
        >
          Xuất báo cáo dữ liệu
        </button>
      </div>
    </div>

    <div id="ratingOverlay" class="custom-overlay">
      <div class="rating-card">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h2 class="m-0 fw-bold">HỆ THỐNG ĐÁNH GIÁ HÀI LÒNG</h2>
          <button
            onclick="closeRating()"
            class="btn-close"
            style="font-size: 2rem"
          ></button>
        </div>
        <div class="face-rating-group">
          <div class="face-item" onclick="selectScore(1)" data-value="1">
            <i class="bi bi-emoji-angry-fill text-danger"></i
            ><span class="face-label">Rất không hài lòng</span>
          </div>
          <div class="face-item" onclick="selectScore(2)" data-value="2">
            <i class="bi bi-emoji-frown-fill text-warning"></i
            ><span class="face-label">Không hài lòng</span>
          </div>
          <div class="face-item" onclick="selectScore(3)" data-value="3">
            <i class="bi bi-emoji-expressionless-fill text-secondary"></i
            ><span class="face-label">Bình thường</span>
          </div>
          <div class="face-item" onclick="selectScore(4)" data-value="4">
            <i class="bi bi-emoji-smile-fill text-primary"></i
            ><span class="face-label">Hài lòng</span>
          </div>
          <div class="face-item" onclick="selectScore(5)" data-value="5">
            <i class="bi bi-emoji-heart-eyes-fill text-success"></i
            ><span class="face-label">Rất hài lòng</span>
          </div>
        </div>
        <textarea
          id="comment"
          class="form-control form-control-lg mb-3"
          rows="3"
          placeholder="Nhập ý kiến đóng góp..."
        ></textarea>
        <button onclick="saveRating()" class="btn btn-submit shadow">
          GỬI ĐÁNH GIÁ
        </button>
      </div>
    </div>

    <script>
      let selectedScore = 0;
      let selectedText = "";
      const SCRIPT_URL =
        "https://script.google.com/macros/s/AKfycbwDNwcNeRiI0fBAlbxzaFEDXjxlpw-eUO8etcg_F0gU2wpt7QQwq-TYudMInGSqv0eY/exec";

      // Logic Đánh giá
      function openRating() {
        document.getElementById("ratingOverlay").style.display = "flex";
      }
      function closeRating() {
        document.getElementById("ratingOverlay").style.display = "none";
        resetForm();
      }

      function selectScore(score) {
        selectedScore = score;
        const labels = [
          "",
          "Rất không hài lòng",
          "Không hài lòng",
          "Bình thường",
          "Hài lòng",
          "Rất hài lòng",
        ];
        selectedText = labels[score];
        document.querySelectorAll(".face-item").forEach((item) => {
          item.classList.toggle("active", item.dataset.value == score);
        });
      }

      async function saveRating() {
        if (!selectedScore) return alert("Vui lòng chọn trạng thái hài lòng!");
        const feedback = {
          score: selectedScore,
          score_text: selectedText,
          comment: document.getElementById("comment").value,
          time: new Date().toLocaleString("vi-VN"),
        };

        // Lưu local dự phòng
        let ratings = JSON.parse(localStorage.getItem("kiosk_ratings")) || [];
        ratings.push(feedback);
        localStorage.setItem("kiosk_ratings", JSON.stringify(ratings));

        try {
          await fetch(SCRIPT_URL, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify(feedback),
          });
          alert("Cảm ơn quý khách! Dữ liệu đã được cập nhật.");
        } catch (e) {
          alert("Đã lưu tạm thời vào máy.");
        }
        closeRating();
      }

      function resetForm() {
        selectedScore = 0;
        document.getElementById("comment").value = "";
        document
          .querySelectorAll(".face-item")
          .forEach((i) => i.classList.remove("active"));
      }

      // Logic Video: Mở cửa sổ Popup chiếm 80% màn hình
      function openVideo(url) {
        const width = window.innerWidth * 0.8;
        const height = window.innerHeight * 0.8;
        const left = (window.innerWidth - width) / 2;
        const top = (window.innerHeight - height) / 2;

        window.open(
          url,
          "youtubeVideo",
          `width=${width},height=${height},left=${left},top=${top},menubar=no,toolbar=no,location=no,status=no`
        );
      }

      function exportExcel() {
        const d = JSON.parse(localStorage.getItem("kiosk_ratings")) || [];
        if (!d.length) return alert("Chưa có dữ liệu!");
        XLSX.writeFile(
          XLSX.utils.book_append_sheet(
            XLSX.utils.book_new(),
            XLSX.utils.json_to_sheet(d),
            "Data"
          ),
          "Bao_Cao.xlsx"
        );
      }
    </script>
  </body>
</html>
